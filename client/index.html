<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/visa-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Visa & Voyage — Professional Visa Application Platform</title>
    <meta name="description" content="Visa & Voyage makes visa applications effortless. Apply for tourist, business, and student visas to 150+ countries with a 98% approval rate. Fast, secure, and expert-guided." />
    <meta name="keywords" content="visa application, tourist visa, travel visa, visa booking, visa services" />
    <meta name="author" content="Visa & Voyage Technologies" />
    <meta name="theme-color" content="#0a0a0a" /> <meta property="og:title" content="Visa & Voyage — Professional Visa Application Platform" />
    <meta property="og:description" content="Apply for visas to 150+ countries. 98% approval rate. Fast, secure, expert-guided." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        background-color: #0a0a0a; /* Tailwind config wala base background */
      }
      
      /* :empty pseudo-class ensure karta hai ki jaise hi React load hoga, ye loader hide ho jayega */
      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 212, 255, 0.15); /* Tailwind cyan.glow */
        border-radius: 50%;
        border-top-color: #00d4ff; /* Tailwind cyan DEFAULT */
        animation: spin 1s ease-in-out infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="spinner"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
