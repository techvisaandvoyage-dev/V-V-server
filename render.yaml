# Render Blueprint: API (Node) + client & admin (static sites on CDN).
# Dashboard: New → Blueprint → connect this repo.
#
# After deploy, your services match these URLs (HTTPS):
#   API:    https://visa-voyage-api.onrender.com
#   Client: https://visa-voyage-client.onrender.com
#   Admin:  https://visa-voyage-admin.onrender.com
#
# If you rename a service in the dashboard, update VITE_* URLs on the static
# sites and clear-cache redeploy, or edit values below before first apply.

services:
  - type: web
    name: visa-voyage-api
    runtime: node
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

  - type: web
    name: visa-voyage-client
    runtime: static
    region: singapore
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Must match your live API origin (no trailing slash). Set in Render Dashboard if different.
    envVars:
      - key: VITE_API_URL
        value: https://server-x358.onrender.com
      - key: VITE_ADMIN_APP_ORIGIN
        value: https://visa-voyage-admin.onrender.com

  - type: web
    name: visa-voyage-admin
    runtime: static
    region: singapore
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://server-x358.onrender.com
